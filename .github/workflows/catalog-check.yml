name: Catalog Check

on:
  push:
    paths: ["skills/**", "agents/**", "rules/**", "custom/**", "scripts/**"]
  pull_request:
    paths: ["skills/**", "agents/**", "rules/**", "custom/**", "scripts/**"]

permissions:
  contents: write

jobs:
  check-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate catalog
        run: python3 scripts/generate-catalog.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet docs/CATALOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated catalog
        if: steps.diff.outputs.changed == 'true' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/CATALOG.md
          git commit -m "Auto-update CATALOG.md"
          git push
